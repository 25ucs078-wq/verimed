version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: verimed-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: verimed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: verimed-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: verimed-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/verimed
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super-secret-verimed-key-change-in-prod
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
